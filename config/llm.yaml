# LLM gateway configuration — provider/model tiers with automatic fallback.
# See docs/decisions/0002-llm-gateway-multiprovider.md.
#
# Each tier is an ORDERED list of candidates: index 0 is primary, the rest are
# fallbacks tried in order when a candidate fails. Nodes request a TIER, never a
# specific provider, so providers can be swapped here without touching code.
#
# Default is Groq-only (free). To UPGRADE the smart tier to a frontier model, prepend one
# candidate to `smart` (Groq stays as the automatic fallback) and set the provider key in .env —
# NO code changes. Examples:
#   - {provider: anthropic, model: claude-sonnet-4-6, temperature: 0.2}   # needs ANTHROPIC_API_KEY
#   - {provider: openai,    model: gpt-4o,            temperature: 0.2}   # needs OPENAI_API_KEY

tiers:
  smart:
    # --- to upgrade, uncomment one line below (becomes primary; Groq below is the fallback) ---
    # - {provider: anthropic, model: claude-sonnet-4-6, temperature: 0.2, max_tokens: 1024}
    - provider: groq
      model: llama-3.3-70b-versatile
      temperature: 0.2
      max_tokens: 1024
  cheap:
    - provider: groq
      model: llama-3.1-8b-instant
      temperature: 0.0
      max_tokens: 512
